[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true

# Multi-chain RPC configurations
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"
optimism = "${OPTIMISM_RPC_URL}"
base = "${BASE_RPC_URL}"
polygon = "${POLYGON_RPC_URL}"
bsc = "${BSC_RPC_URL}"
avalanche = "${AVALANCHE_RPC_URL}"
fantom = "${FANTOM_RPC_URL}"
linea = "${LINEA_RPC_URL}"

# Etherscan API keys for verification
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ARBISCAN_API_KEY}" }
optimism = { key = "${OPTIMISTIC_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}" }
polygon = { key = "${POLYGONSCAN_API_KEY}" }
bsc = { key = "${BSCSCAN_API_KEY}" }
avalanche = { key = "${SNOWTRACE_API_KEY}" }
fantom = { key = "${FTMSCAN_API_KEY}" }

# Test profiles
[profile.test]
verbosity = 3
fuzz = { runs = 1000 }
invariant = { runs = 100 }

[profile.ci]
fuzz = { runs = 10000 }
invariant = { runs = 500 }
verbosity = 4
