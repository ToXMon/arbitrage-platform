---
version: "2.0"

services:
  # Frontend - Next.js web application
  frontend:
    image: arbitrageplatform/frontend:1.0.0
    expose:
      - port: 3000
        as: 80
        to:
          - global: true
    env:
      - NEXT_PUBLIC_API_URL=http://api:3001
      - NODE_ENV=production
    depends_on:
      - api
    
  # API - Fastify backend service
  api:
    image: arbitrageplatform/api:1.0.0
    expose:
      - port: 3001
        as: 80
        to:
          - global: true
      - port: 3001
        to:
          - service: frontend
          - service: bot-ethereum
          - service: bot-arbitrum
          - service: bot-optimism
          - service: bot-base
    env:
      - DATABASE_URL=postgresql://arbitrage:arbitrage123@postgres:5432/arbitrage_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      - postgres
      - redis
    
  # Bot Worker - Ethereum Mainnet
  bot-ethereum:
    image: arbitrageplatform/bot:1.0.0
    env:
      - CHAIN_ID=1
      - CHAIN_NAME=ethereum
      - RPC_URL=https://eth-mainnet.g.alchemy.com/v2/YOUR_API_KEY
      - WS_URL=wss://eth-mainnet.g.alchemy.com/v2/YOUR_API_KEY
      - DATABASE_URL=postgresql://arbitrage:arbitrage123@postgres:5432/arbitrage_db
      - REDIS_URL=redis://redis:6379
      - API_URL=http://api:3001
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
      - api
    
  # Bot Worker - Arbitrum
  bot-arbitrum:
    image: arbitrageplatform/bot:1.0.0
    env:
      - CHAIN_ID=42161
      - CHAIN_NAME=arbitrum
      - RPC_URL=https://arb-mainnet.g.alchemy.com/v2/YOUR_API_KEY
      - WS_URL=wss://arb-mainnet.g.alchemy.com/v2/YOUR_API_KEY
      - DATABASE_URL=postgresql://arbitrage:arbitrage123@postgres:5432/arbitrage_db
      - REDIS_URL=redis://redis:6379
      - API_URL=http://api:3001
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
      - api
    
  # Bot Worker - Optimism
  bot-optimism:
    image: arbitrageplatform/bot:1.0.0
    env:
      - CHAIN_ID=10
      - CHAIN_NAME=optimism
      - RPC_URL=https://opt-mainnet.g.alchemy.com/v2/YOUR_API_KEY
      - WS_URL=wss://opt-mainnet.g.alchemy.com/v2/YOUR_API_KEY
      - DATABASE_URL=postgresql://arbitrage:arbitrage123@postgres:5432/arbitrage_db
      - REDIS_URL=redis://redis:6379
      - API_URL=http://api:3001
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
      - api
    
  # Bot Worker - Base
  bot-base:
    image: arbitrageplatform/bot:1.0.0
    env:
      - CHAIN_ID=8453
      - CHAIN_NAME=base
      - RPC_URL=https://base-mainnet.g.alchemy.com/v2/YOUR_API_KEY
      - WS_URL=wss://base-mainnet.g.alchemy.com/v2/YOUR_API_KEY
      - DATABASE_URL=postgresql://arbitrage:arbitrage123@postgres:5432/arbitrage_db
      - REDIS_URL=redis://redis:6379
      - API_URL=http://api:3001
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
      - api
    
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    expose:
      - port: 5432
        to:
          - service: api
          - service: bot-ethereum
          - service: bot-arbitrum
          - service: bot-optimism
          - service: bot-base
    env:
      - POSTGRES_USER=arbitrage
      - POSTGRES_PASSWORD=arbitrage123
      - POSTGRES_DB=arbitrage_db
      - PGDATA=/var/lib/postgresql/data/pgdata
    params:
      storage:
        pgdata:
          mount: /var/lib/postgresql/data
          readOnly: false
    
  # Redis Cache
  redis:
    image: redis:7-alpine
    expose:
      - port: 6379
        to:
          - service: api
          - service: bot-ethereum
          - service: bot-arbitrum
          - service: bot-optimism
          - service: bot-base
    env:
      - REDIS_MAXMEMORY=256mb
      - REDIS_MAXMEMORY_POLICY=allkeys-lru

profiles:
  compute:
    frontend:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 1Gi
          
    api:
      resources:
        cpu:
          units: 1.0
        memory:
          size: 1Gi
        storage:
          size: 1Gi
          
    bot-ethereum:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 512Mi
          
    bot-arbitrum:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 512Mi
          
    bot-optimism:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 512Mi
          
    bot-base:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 512Mi
          
    postgres:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          - name: default
            size: 1Gi
          - name: pgdata
            size: 20Gi
            attributes:
              persistent: true
              class: beta2
              
    redis:
      resources:
        cpu:
          units: 0.25
        memory:
          size: 256Mi
        storage:
          size: 256Mi

  placement:
    akash:
      attributes:
        akash.network: "true"
      pricing:
        frontend:
          denom: uakt
          amount: 100
        api:
          denom: uakt
          amount: 150
        bot-ethereum:
          denom: uakt
          amount: 100
        bot-arbitrum:
          denom: uakt
          amount: 100
        bot-optimism:
          denom: uakt
          amount: 100
        bot-base:
          denom: uakt
          amount: 100
        postgres:
          denom: uakt
          amount: 150
        redis:
          denom: uakt
          amount: 50

deployment:
  frontend:
    akash:
      profile: frontend
      count: 1
      
  api:
    akash:
      profile: api
      count: 1
      
  bot-ethereum:
    akash:
      profile: bot-ethereum
      count: 1
      
  bot-arbitrum:
    akash:
      profile: bot-arbitrum
      count: 1
      
  bot-optimism:
    akash:
      profile: bot-optimism
      count: 1
      
  bot-base:
    akash:
      profile: bot-base
      count: 1
      
  postgres:
    akash:
      profile: postgres
      count: 1
      
  redis:
    akash:
      profile: redis
      count: 1
